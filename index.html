<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TOONOOT 剧创级AI</title>
<style>*{box-sizing:border-box;font-family:system-ui}body{background:#f7f9fc;margin:0}.container{max-width:900px;margin:30px auto;padding:20px}.card{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,0.05)}input,textarea,button{width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:12px;margin:8px 0}button{background:#2563eb;color:white;font-weight:600;border:none;cursor:pointer}#result{background:#f8f9fa;padding:16px;border-radius:12px;margin-top:16px;white-space:pre-wrap}video{max-width:100%;border-radius:12px;margin-top:12px}</style>
<div class="container"><h1>🎬 TOONOOT 文生视频+配音+字幕</h1><div class="card"><h3>📝 视频描述</h3><textarea id='p' rows='3' placeholder='例如：可爱小猫在花园奔跑，治愈系4K'></textarea><input id='v' placeholder='配音文字：欢迎使用TOONOOT智能创作平台'><button onclick='go()'>生成视频+配音+字幕</button></div><div id='result'></div></div>
<script>async function go(){const r=document.getElementById('result');r.innerHTML='🚀 生成中...约10-20秒';const res=await fetch('/.netlify/functions/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'text2image',prompt:document.getElementById('p').value})});const d=await res.json();r.innerHTML=JSON.stringify(d,null,2);if(d.data?.images?.[0]?.image_url)r.innerHTML+='<img src=\''+d.data.images[0].image_url+'\'>'}</script>
