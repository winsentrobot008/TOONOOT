<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOONOOT AI视频生成</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
    :root{
      --primary:#165DFF;
      --bg:#0F172A;
      --card:#1E293B;
      --text:#F8FAFC;
      --sub:#94A3B8;
      --ok:#10B981;
      --run:#F59E0B;
      --view:#6366F1;
    }
    body{background:var(--bg);color:var(--text);padding:24px}
    .wrap{max-width:900px;margin:0 auto}
    .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px}
    .lang-box select{background:var(--card);color:var(--text);border:none;padding:6px 10px;border-radius:8px}
    .panel{background:var(--card);border-radius:16px;padding:26px;margin-bottom:20px}
    h1{font-size:26px;margin-bottom:8px}
    .tip{color:var(--sub);margin-bottom:20px}
    textarea{width:100%;height:130px;background:var(--bg);border:1px solid #334155;border-radius:12px;padding:15px;color:var(--text);font-size:15px;resize:none;margin-bottom:15px}
    .btn{width:100%;padding:15px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .status{padding:14px;border-radius:10px;background:var(--bg);margin-top:18px;display:none}
    video{width:100%;border-radius:12px;margin-top:20px;display:none}
    .progress-bar{width:100%;height:8px;background:#334155;border-radius:4px;margin:16px 0;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--ok));width:0%;transition:width 0.3s ease}
    .step-list{margin-top:25px}
    .step-item{display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--bg);border-radius:10px;margin-bottom:9px}
    .step-left{display:flex;align-items:center}
    .step-num{width:28px;height:28px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;margin-right:12px}
    .step-item.curr .step-num{background:var(--run)}
    .step-item.fin .step-num{background:var(--ok)}
    .view-btn{padding:4px 10px;background:var(--view);border:none;border-radius:6px;color:#fff;font-size:12px;cursor:pointer;display:none}
    .step-item.fin .view-btn{display:block}
    .foot-note{text-align:center;font-size:12px;color:var(--sub);margin-top:35px}
    .preview-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:999}
    .preview-box{background:var(--card);padding:20px;border-radius:14px;max-width:600px;width:90%;max-height:80vh;overflow:auto}
    .close-btn{text-align:right;margin-bottom:10px}
    .close-btn button{background:#ef4444;color:#fff;border:none;padding:5px 12px;border-radius:6px;cursor:pointer}
    .preview-content{line-height:1.6;color:#eee}
  </style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h2>TOONOOT</h2>
    <div class="lang-box">
      <select id="langSel" onchange="switchLang()">
        <option value="zh">简体中文</option>
        <option value="sv">Svenska</option>
        <option value="en">English</option>
      </select>
    </div>
  </div>

  <div class="panel">
    <h1 id="pageTitle">AI全自动视频生成</h1>
    <p class="tip" id="pageDesc">输入文案，一键自动生成成片视频</p>
    <textarea id="inputArea" placeholder="在此输入创作文案内容..."></textarea>
    <button class="btn" id="genBtn" onclick="createVideo()">开始生成视频</button>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div id="stateBox" class="status"></div>
    <video id="videoPlay" controls></video>
  </div>

  <div class="panel step-list" id="stepBox" style="display:none">
    <h3 id="procTitle">生成进度流程</h3>
    <div class="step-item" id="s1">
      <div class="step-left"><div class="step-num">1</div><span id="txt1">文案改写优化</span></div>
      <button class="view-btn" onclick="openPreview(1)">查看结果</button>
    </div>
    <div class="step-item" id="s2">
      <div class="step-left"><div class="step-num">2</div><span id="txt2">内容剧本创作</span></div>
      <button class="view-btn" onclick="openPreview(2)">查看结果</button>
    </div>
    <div class="step-item" id="s3">
      <div class="step-left"><div class="step-num">3</div><span id="txt3">分镜头脚本制作</span></div>
      <button class="view-btn" onclick="openPreview(3)">查看结果</button>
    </div>
    <div class="step-item" id="s4">
      <div class="step-left"><div class="step-num">4</div><span id="txt4">AI场景图片生成</span></div>
      <button class="view-btn" onclick="openPreview(4)">查看结果</button>
    </div>
    <div class="step-item" id="s5">
      <div class="step-left"><div class="step-num">5</div><span id="txt5">视频剪辑合成</span></div>
      <button class="view-btn" onclick="openPreview(5)">查看结果</button>
    </div>
    <div class="step-item" id="s6">
      <div class="step-left"><div class="step-num">6</div><span id="txt6">智能语音配音</span></div>
      <button class="view-btn" onclick="openPreview(6)">查看结果</button>
    </div>
    <div class="step-item" id="s7">
      <div class="step-left"><div class="step-num">7</div><span id="txt7">自动字幕匹配</span></div>
      <button class="view-btn" onclick="openPreview(7)">查看结果</button>
    </div>
    <div class="step-item" id="s8">
      <div class="step-left"><div class="step-num">8</div><span id="txt8">最终成片导出</span></div>
      <button class="view-btn" onclick="openPreview(8)">查看结果</button>
    </div>
  </div>

  <div class="foot-note">
    瑞典合规架构 | API安全防护 | 用户数据加密保护
  </div>
</div>

<!-- 预览弹窗 -->
<div class="preview-modal" id="previewModal">
  <div class="preview-box">
    <div class="close-btn"><button onclick="closePreview()">关闭</button></div>
    <div class="preview-content" id="previewContent"></div>
  </div>
</div>

<script>
const langData = {
  zh:{
    title:"AI全自动视频生成",desc:"输入文案，一键自动生成成片视频",
    place:"在此输入创作文案内容...",btn:"开始生成视频",proc:"生成进度流程",
    t1:"文案改写优化",t2:"内容剧本创作",t3:"分镜头脚本制作",t4:"AI场景图片生成",
    t5:"视频剪辑合成",t6:"智能语音配音",t7:"自动字幕匹配",t8:"最终成片导出",
    run:"正在处理中...",succ:"视频生成完成",err:"生成出现异常"
  },
  sv:{
    title:"AI Automatisk Videoproduktion",desc:"Skriv text, skapa video med ett klick",
    place:"Skriv ditt innehåll här...",btn:"Skapa Video",proc:"Framsteg",
    t1:"Textförbättring",t2:"Manusskapande",t3:"Storyboard",t4:"Bildgenerering",
    t5:"Videoredigering",t6:"Röstinspelning",t7:"Undertext",t8:"Exportera video",
    run:"Bearbetar...",succ:"Video klar",err:"Fel uppstod"
  },
  en:{
    title:"AI Automatic Video Generator",desc:"Input text and generate video one-click",
    place:"Write your content here...",btn:"Generate Video",proc:"Process Progress",
    t1:"Text Rewrite",t2:"Script Writing",t3:"Storyboard",t4:"Image Generation",
    t5:"Video Edit",t6:"Voice Dubbing",t7:"Subtitle Add",t8:"Export Final Video",
    run:"Processing...",succ:"Video finished",err:"Generation error"
  }
};

// 各步骤缓存结果
let stepResult = {};

function switchLang(){
  let l = document.getElementById("langSel").value;
  let d = langData[l];
  document.getElementById("pageTitle").innerText=d.title;
  document.getElementById("pageDesc").innerText=d.desc;
  document.getElementById("inputArea").placeholder=d.place;
  document.getElementById("genBtn").innerText=d.btn;
  document.getElementById("procTitle").innerText=d.proc;
  document.getElementById("txt1").innerText=d.t1;
  document.getElementById("txt2").innerText=d.t2;
  document.getElementById("txt3").innerText=d.t3;
  document.getElementById("txt4").innerText=d.t4;
  document.getElementById("txt5").innerText=d.t5;
  document.getElementById("txt6").innerText=d.t6;
  document.getElementById("txt7").innerText=d.t7;
  document.getElementById("txt8").innerText=d.t8;
}

const btn=document.getElementById("genBtn");
const state=document.getElementById("stateBox");
const video=document.getElementById("videoPlay");
const stepBox=document.getElementById("stepBox");
const steps=[...document.querySelectorAll(".step-item")];
const progressFill=document.getElementById("progressFill");
const previewModal=document.getElementById("previewModal");
const previewContent=document.getElementById("previewContent");

// 模拟各步骤产出内容
function getStepMockResult(idx,originText){
  switch(idx){
    case 1:return `【改写后文案】\n${originText}\n优化润色完成，增强画面叙事感`;
    case 2:return `【完整剧本】\n场景、人物、对白框架已搭建完毕`;
    case 3:return `【分镜头脚本】\n共计8组镜头，时长与运镜参数已设定`;
    case 4:return `【生成场景原画】\n批量生成对应剧情画面素材`;
    case 5:return `【剪辑序列】\n画面拼接、转场节奏初步合成`;
    case 6:return `【配音音频】\n匹配人物声线与语速音频文件`;
    case 7:return `【字幕时序】\n文字与音画时间轴对齐完成`;
    case 8:return `【最终成片】\n完整MP4视频文件，可预览播放`;
    default:return "暂无内容";
  }
}

async function createVideo(){
  let text=document.getElementById("inputArea").value.trim();
  if(!text){alert("请输入创作文案");return;}
  btn.disabled=true;
  state.style.display="block";
  state.innerText=langData.zh.run;
  stepBox.style.display="block";
  video.style.display="none";
  steps.forEach(s=>s.className="step-item");
  progressFill.style.width="0%";
  stepResult={};

  await delay(800);await setStep(1,text);
  await delay(800);await setStep(2,text);
  await delay(800);await setStep(3,text);
  await delay(800);await setStep(4,text);
  await delay(800);await setStep(5,text);
  await delay(800);await setStep(6,text);
  await delay(800);await setStep(7,text);
  await delay(800);await setStep(8,text);

  state.innerText=langData.zh.succ;
  video.src="https://www.w3schools.com/html/mov_bbb.mp4";
  video.style.display="block";
  btn.disabled=false;
}

function delay(ms){return new Promise(res=>setTimeout(res,ms))}
async function setStep(idx,text){
  let percent = (idx / 8) * 100;
  progressFill.style.width = percent + "%";
  steps.forEach((s,i)=>{
    if(i<idx-1)s.className="step-item fin";
    else if(i===idx-1)s.className="step-item curr";
    else s.className="step-item";
  });
  stepResult[idx] = getStepMockResult(idx,text);
}

// 打开单步预览
function openPreview(idx){
  let res = stepResult[idx] || "该步骤尚未完成生成";
  previewContent.innerText = res;
  previewModal.style.display="flex";
}
function closePreview(){
  previewModal.style.display="none";
}
</script>
</body>
</html>
