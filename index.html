<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOONOOT · 文生视频+配音+字幕</title>
<style>
*{box-sizing:border-box;font-family:system-ui}
body{margin:0;background:#f7f8fa}
.container{max-width:900px;margin:30px auto;padding:20px}
.card{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 2px 10px #00000009}
input,textarea,button{width:100%;padding:12px 14px;border:1px solid #e2e8f0;border-radius:12px;margin:8px 0}
button{background:#2563eb;color:white;font-weight:600;border:none;cursor:pointer}
#result{white-space:pre-wrap;background:#f8fafc;padding:16px;border-radius:12px;margin-top:16px}
video{max-width:100%;border-radius:12px;margin-top:12px}
</style>

<div class="container">
  <h1>🎬 TOONOOT AI 视频生成（文生视频+配音+字幕）</h1>

  <div class="card">
    <h3>📝 输入视频描述</h3>
    <textarea id="prompt" rows="3" placeholder="例如：一只可爱的小猫在草地上奔跑，4K高清，治愈风格"></textarea>
    <input id="voiceTxt" placeholder="输入配音文字：欢迎来到TOONOOT AI创意平台">
    <button onclick="generateVideo()">▶️ 生成视频 + 配音 + 字幕</button>
  </div>

  <div id="result"></div>
</div>

<script>
async function generateVideo() {
  const prompt = document.getElementById("prompt").value;
  const voiceTxt = document.getElementById("voiceTxt").value;
  const res = document.getElementById("result");

  res.innerHTML = "🚀 视频生成中... 10-20秒后返回结果";

  const r = await fetch("/.netlify/functions/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      type: "video_with_voice",
      prompt: prompt,
      voice_text: voiceTxt
    })
  });

  const data = await r.json();
  res.innerHTML = JSON.stringify(data, null, 2);

  if (data.data?.video_url) {
    res.innerHTML += `<video src="${data.data.video_url}" controls></video>`;
  }
}
</script>
