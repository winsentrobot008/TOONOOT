<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOONOOT | AI 动画生成</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif}
    body{background:#0b101b;color:#eaeefe;min-height:100vh;padding:20px}
    .wrap{max-width:700px;margin:80px auto 0;padding:0 20px}
    h1{font-size:40px;font-weight:800;margin-bottom:12px;color:#fff}
    .sub{color:#9ba7c6;margin-bottom:30px}
    .box{background:#141925;padding:32px;border-radius:18px;box-shadow:0 8px 30px #0005}
    textarea{width:100%;height:180px;padding:18px;background:#1d2333;border:none;border-radius:14px;color:#f0f4ff;font-size:16px;resize:none}
    textarea::placeholder{color:#717da3}
    button{margin-top:20px;width:100%;padding:18px;background:#4b7fff;border:none;border-radius:14px;color:#fff;font-size:17px;font-weight:600;cursor:pointer}
    button:hover{background:#4072ee}
    .status{margin-top:20px;padding:16px;border-radius:12px;background:#1d2333;color:#c3d0ff}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>TOONOOT</h1>
    <p class="sub">AI 驱动的动画视频一键生成工具</p>
    <div class="box">
      <textarea id="input" placeholder="请输入你想要生成视频的文案…"></textarea>
      <button onclick="run()">生成视频</button>
      <div id="status" style="display:none;margin-top:20px"></div>
    </div>
  </div>

  <script>
    async function run() {
      const t = document.getElementById('input').value.trim();
      const s = document.getElementById('status');
      if (!t) { alert('请输入内容'); return; }
      s.style.display = 'block';
      s.textContent = '⏳ 处理中...';
      try {
        const r = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: t })
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || '失败');
        s.textContent = '✅ 成功：' + d.message;
      } catch (e) {
        s.textContent = '❌ 错误：' + e.message;
      }
    }
  </script>
</body>
</html>
