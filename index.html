<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOONOOT AI 动画生成</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
    body{background:#0b101b;color:#eaeefe;padding:30px}
    .box{max-width:600px;margin:50px auto;background:#141925;padding:30px;border-radius:16px}
    h1{color:#fff;margin-bottom:20px}
    textarea{width:100%;height:160px;background:#1d2333;color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px}
    button{width:100%;padding:16px;background:#4b7fff;color:#fff;border:none;border-radius:12px;margin-top:16px;font-size:16px}
    .status{margin-top:20px;padding:16px;background:#1d2333;border-radius:12px;color:#c3d0ff}
    video{margin-top:20px;width:100%;border-radius:12px;display:none}
  </style>
</head>
<body>
  <div class="box">
    <h1>TOONOOT AI 动画生成</h1>
    <textarea id="text" placeholder="请输入你要生成视频的文案…"></textarea>
    <button onclick="go()">生成视频</button>
    <div id="status" style="display:none"></div>
    <video id="video" controls></video>
  </div>

  <script>
    async function go() {
      const t = document.getElementById('text').value.trim();
      const s = document.getElementById('status');
      const v = document.getElementById('video');
      if (!t) return alert('请输入内容');
      s.style.display = 'block';
      s.innerText = '⏳ 正在调用火山AI生成视频...';
      try {
        const r = await fetch('/.netlify/functions/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: t })
        });
        const d = await r.json();
        if (d.success) {
          s.innerText = '✅ ' + d.message;
          if (d.videoUrl && d.videoUrl !== '#') {
            v.src = d.videoUrl;
            v.style.display = 'block';
          }
        } else {
          s.innerText = '❌ ' + d.error;
        }
      } catch (e) {
        s.innerText = '❌ 错误：' + e.message;
      }
    }
  </script>
</body>
</html>
