<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOONOOT - 即梦AI视频生成平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(to right, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-section {
            margin-bottom: 30px;
        }
        #prompt {
            width: 100%;
            height: 100px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            resize: none;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        #prompt:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }
        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .progress-section {
            margin-bottom: 30px;
        }
        #progress-bar {
            width: 100%;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }
        #progress-text {
            text-align: center;
            color: #666;
            font-size: 14px;
        }
        .video-section {
            margin-bottom: 30px;
        }
        #video-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }
        #video {
            width: 100%;
            display: block;
            border: none;
        }
        #subtitle-overlay {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 18px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            padding: 5px 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            margin: 0 20px;
        }
        .subtitle-section {
            margin-bottom: 30px;
        }
        #subtitle {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: #f9f9f9;
            font-size: 16px;
            min-height: 80px;
            white-space: pre-wrap;
        }
        .debug-section {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #333;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        .debug-section h3 {
            margin-bottom: 10px;
            color: #667eea;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 TOONOOT - 即梦AI视频生成平台</h1>
        
        <div class="input-section">
            <textarea id="prompt" placeholder="请输入视频描述，例如：一只可爱的小猫在草地上追逐蝴蝶，阳光明媚，色彩鲜艳。"></textarea>
        </div>
        
        <div class="button-group">
            <button id="generate-btn">生成视频</button>
            <button id="reset-btn">重置</button>
        </div>
        
        <div class="progress-section">
            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <div id="progress-text">等待生成...</div>
        </div>
        
        <div class="video-section">
            <div id="video-container">
                <video id="video" controls></video>
                <div id="subtitle-overlay"></div>
            </div>
        </div>
        
        <div class="subtitle-section">
            <div id="subtitle">自动生成的字幕将显示在这里...</div>
        </div>
        
        <div class="debug-section">
            <h3>调试信息</h3>
            <div id="debug-info">等待操作...</div>
        </div>
    </div>

    <script>
        // DOM元素
        const promptInput = document.getElementById('prompt');
        const generateBtn = document.getElementById('generate-btn');
        const resetBtn = document.getElementById('reset-btn');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        const video = document.getElementById('video');
        const subtitle = document.getElementById('subtitle');
        const subtitleOverlay = document.getElementById('subtitle-overlay');
        const debugInfo = document.getElementById('debug-info');
        
        // 状态管理
        let isGenerating = false;
        let currentTaskId = null;
        let pollingInterval = null;
        let videoSubtitles = [];
        
        // 初始化
        function init() {
            // 设置默认视频
            video.src = 'https://www.w3schools.com/html/mov_bbb.mp4';
            video.load();
            
            // 绑定事件
            generateBtn.addEventListener('click', generateVideo);
            resetBtn.addEventListener('click', resetAll);
            video.addEventListener('timeupdate', updateSubtitle);
            
            // 检查后端状态
            checkBackendStatus();
            
            logDebug('页面加载完成，等待用户操作...');
        }
        
        // 检查后端状态
        async function checkBackendStatus() {
            try {
                const response = await fetch('/.netlify/functions/generate?check=1');
                const data = await response.json();
                logDebug(`后端状态: ${data.status}, 版本: ${data.version}, 服务: ${data.service}`);
            } catch (error) {
                logDebug(`后端连接失败: ${error.message}`);
            }
        }
        
        // 生成视频
        async function generateVideo() {
            if (isGenerating) return;
            
            const prompt = promptInput.value.trim();
            if (!prompt) {
                alert('请输入视频描述！');
                return;
            }
            
            // 更新状态
            isGenerating = true;
            generateBtn.disabled = true;
            resetProgress();
            setProgress(10, '正在提交任务到即梦AI...');
            
            try {
                // 提交任务
                const response = await fetch('/.netlify/functions/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'submit', prompt: prompt })
                });
                
                const data = await response.json();
                logDebug('任务提交响应: ' + JSON.stringify(data));
                
                if (data.task_id) {
                    currentTaskId = data.task_id;
                    
                    // 如果直接返回成功（备用视频）
                    if (data.status === 'success') {
                        setProgress(100, data.status_text);
                        renderResult(data.result);
                        isGenerating = false;
                        generateBtn.disabled = false;
                        return;
                    }
                    
                    // 开始轮询
                    setProgress(20, '即梦AI正在渲染视频...');
                    startPolling();
                } else {
                    throw new Error('未获取到任务ID');
                }
            } catch (error) {
                isGenerating = false;
                generateBtn.disabled = false;
                setProgress(0, '任务提交失败: ' + error.message);
                logDebug('任务提交失败: ' + error.message);
            }
        }
        
        // 开始轮询
        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            
            let retryCount = 0;
            const maxRetries = 30; // 最多轮询1分钟
            
            pollingInterval = setInterval(async () => {
                if (!currentTaskId || retryCount >= maxRetries) {
                    stopPolling();
                    setProgress(0, '任务超时，请重试');
                    isGenerating = false;
                    generateBtn.disabled = false;
                    return;
                }
                
                try {
                    const response = await fetch('/.netlify/functions/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'query', task_id: currentTaskId })
                    });
                    
                    const data = await response.json();
                    logDebug('轮询响应: ' + JSON.stringify(data));
                    
                    if (data.status === 'running') {
                        // 更新进度
                        const progress = data.status_text ? 
                            parseInt(data.status_text.replace(/[^0-9]/g, '')) : 
                            30 + retryCount * 2;
                        setProgress(Math.min(progress, 90), data.status_text || 'AI渲染中...');
                    } else if (data.status === 'success') {
                        stopPolling();
                        setProgress(100, data.status_text);
                        renderResult(data.result);
                        isGenerating = false;
                        generateBtn.disabled = false;
                    } else {
                        throw new Error(data.status_text || '生成失败');
                    }
                    
                    retryCount++;
                } catch (error) {
                    logDebug('轮询失败: ' + error.message);
                    retryCount++;
                    
                    // 连续失败3次后使用备用视频
                    if (retryCount >= 3) {
                        stopPolling();
                        setProgress(100, '生成完成（备用视频）');
                        renderResult({
                            video_url: 'https://www.w3schools.com/html/mov_bbb.mp4',
                            cover_url: 'https://picsum.photos/1280/720',
                            subtitle: promptInput.value
                        });
                        isGenerating = false;
                        generateBtn.disabled = false;
                    }
                }
            }, 2000);
        }
        
        // 停止轮询
        function stopPolling() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }
        }
        
        // 渲染结果
        function renderResult(result) {
            // 更新视频
            video.src = result.video_url;
            video.load();
            video.play().catch(err => logDebug('自动播放失败: ' + err.message));
            
            // 更新字幕
            if (result.subtitle) {
                videoSubtitles = parseSubtitles(result.subtitle);
                subtitle.textContent = result.subtitle;
                logDebug('已加载字幕: ' + JSON.stringify(videoSubtitles));
            } else {
                videoSubtitles = [];
                subtitle.textContent = '无字幕';
            }
        }
        
        // 解析字幕
        function parseSubtitles(text) {
            if (!text) return [];
            
            const sentences = text.split(/([。！？])/).filter(s => s.trim());
            const subtitles = [];
            let time = 0;
            
            sentences.forEach((sentence, index) => {
                if (index % 2 === 0) {
                    subtitles.push({
                        time: time,
                        text: sentence + (sentences[index+1] || '')
                    });
                    time += 2;
                }
            });
            
            return subtitles;
        }
        
        // 更新字幕
        function updateSubtitle() {
            if (videoSubtitles.length === 0) {
                subtitleOverlay.textContent = '';
                return;
            }
            
            const currentTime = video.currentTime;
            
            for (let i = videoSubtitles.length - 1; i >= 0; i--) {
                if (videoSubtitles[i].time <= currentTime) {
                    subtitleOverlay.textContent = videoSubtitles[i].text;
                    break;
                }
            }
        }
        
        // 设置进度
        function setProgress(percent, text) {
            progressFill.style.width = `${percent}%`;
            progressText.textContent = text;
        }
        
        // 重置进度
        function resetProgress() {
            setProgress(0, '等待生成...');
        }
        
        // 重置所有
        function resetAll() {
            stopPolling();
            isGenerating = false;
            currentTaskId = null;
            videoSubtitles = [];
            
            promptInput.value = '';
            generateBtn.disabled = false;
            resetProgress();
            
            video.src = 'https://www.w3schools.com/html/mov_bbb.mp4';
            video.load();
            
            subtitle.textContent = '自动生成的字幕将显示在这里...';
            subtitleOverlay.textContent = '';
            
            logDebug('已重置所有状态，等待新的操作...');
        }
        
        // 记录调试信息
        function logDebug(message) {
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
            debugInfo.textContent = `[${timeStr}] ${message}\n` + debugInfo.textContent;
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
